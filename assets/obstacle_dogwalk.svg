<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Dog Walk — center platform with ramp supports -->
  <!-- Ground shadow -->
  <rect x="20" y="122" width="160" height="3" rx="1.5" fill="#4A2A10" opacity="0.2"/>

  <!-- Left ramp support -->
  <rect x="38" y="90" width="8" height="32" rx="2" fill="#5a3d1a" stroke="#3a2410" stroke-width="0.5"/>
  <!-- Right ramp support -->
  <rect x="154" y="90" width="8" height="32" rx="2" fill="#5a3d1a" stroke="#3a2410" stroke-width="0.5"/>

  <!-- Main platform plank -->
  <rect x="38" y="88" width="124" height="14" rx="3" fill="#4aa8c7" stroke="#2a6887" stroke-width="0.8"/>

  <!-- Top surface highlight (white fringe) -->
  <rect x="38" y="88" width="124" height="4" rx="2" fill="#ffffff" opacity="0.35"/>

  <!-- Left end cap (yellow footing) -->
  <rect x="38" y="88" width="16" height="14" rx="2" fill="#e6c200" stroke="#c4a800" stroke-width="0.5"/>
  <!-- Right end cap (yellow footing) -->
  <rect x="146" y="88" width="16" height="14" rx="2" fill="#e6c200" stroke="#c4a800" stroke-width="0.5"/>

  <!-- Center plank detail (subtle line) -->
  <rect x="38" y="92" width="124" height="1" fill="#ffffff" opacity="0.1"/>
</svg>