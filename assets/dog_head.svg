<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Dog head — round skull with snout, eyes, nose, ear patches -->
  <g transform="translate(100,100)">
    <!-- Skull (round, white) -->
    <ellipse cx="0" cy="5" rx="38" ry="34" fill="#FFFFFF" stroke="#E5E0DA" stroke-width="0.7"/>

    <!-- Left ear-base brown patch -->
    <path d="M -22 -8
             C -28 -14, -30 -22, -28 -28
             C -25 -34, -18 -34, -14 -28
             C -10 -22, -10 -16, -14 -12
             C -18 -8, -20 -8, -22 -8 Z"
          fill="#D45500"/>

    <!-- Right ear-base brown patch -->
    <path d="M 22 -8
             C 28 -14, 30 -22, 28 -28
             C 25 -34, 18 -34, 14 -28
             C 10 -22, 10 -16, 14 -12
             C 18 -8, 20 -8, 22 -8 Z"
          fill="#D45500"/>

    <!-- Forehead white tuft -->
    <ellipse cx="0" cy="-12" rx="12" ry="8" fill="#F8F4EF" opacity="0.5"/>

    <!-- Snout -->
    <path d="M -10 20
             L 0 48
             L 10 20
             C 8 26, -8 26, -10 20 Z"
          fill="#FFFFFF" stroke="#E5E0DA" stroke-width="0.5"/>

    <!-- Nose -->
    <circle cx="0" cy="48" r="5" fill="#1A0A00"/>

    <!-- Eyes -->
    <ellipse cx="-12" cy="4" rx="3.5" ry="4.5" fill="#111111"/>
    <ellipse cx="12" cy="4" rx="3.5" ry="4.5" fill="#111111"/>
    <!-- Eye highlights -->
    <circle cx="-11" cy="2.5" r="1.2" fill="#FFFFFF"/>
    <circle cx="13" cy="2.5" r="1.2" fill="#FFFFFF"/>

    <!-- Mouth line -->
    <path d="M -5 36 Q 0 40 5 36" stroke="#1A0A00" stroke-width="0.7" fill="none"/>

    <!-- Cheek fluff -->
    <ellipse cx="-22" cy="12" rx="8" ry="6" fill="#FFFFFF" opacity="0.6"/>
    <ellipse cx="22" cy="12" rx="8" ry="6" fill="#FFFFFF" opacity="0.6"/>
  </g>
</svg>
