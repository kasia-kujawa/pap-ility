<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Tunnel body (fabric oval) -->
  <ellipse cx="100" cy="100" rx="72" ry="28" fill="#5bc0de" stroke="#3a8aa8" stroke-width="0.8"/>

  <!-- Fabric surface lines (rug texture) -->
  <ellipse cx="72" cy="100" rx="5" ry="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="86" cy="100" rx="5" ry="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="100" cy="100" rx="5" ry="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="114" cy="100" rx="5" ry="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="128" cy="100" rx="5" ry="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>

  <!-- Left opening (dark interior) -->
  <ellipse cx="28" cy="100" rx="10" ry="24" fill="#1a3040" stroke="#0d1a24" stroke-width="0.5"/>
  <!-- Left opening inner rim -->
  <ellipse cx="28" cy="100" rx="6" ry="18" fill="#0a1520"/>

  <!-- Right opening (dark interior) -->
  <ellipse cx="172" cy="100" rx="10" ry="24" fill="#1a3040" stroke="#0d1a24" stroke-width="0.5"/>
  <!-- Right opening inner rim -->
  <ellipse cx="172" cy="100" rx="6" ry="18" fill="#0a1520"/>

  <!-- Top highlight -->
  <ellipse cx="100" cy="88" rx="60" ry="10" fill="#ffffff" opacity="0.15"/>
</svg>