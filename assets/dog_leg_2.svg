<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Frame 2: opposite diagonal stride - right front + left back forward -->
  <g transform="translate(100,100)">
    <!-- Front left - back -->
    <ellipse cx="-28" cy="-22" rx="8" ry="12" fill="#FFFFFF" stroke="#E5E0DA" stroke-width="0.5" transform="rotate(-10, -28, -22)"/>
    <ellipse cx="-28" cy="-14" rx="5" ry="6" fill="#F5F0EA" opacity="0.8"/>

    <!-- Front right - forward -->
    <ellipse cx="28" cy="-42" rx="8" ry="12" fill="#FFFFFF" stroke="#E5E0DA" stroke-width="0.5" transform="rotate(10, 28, -42)"/>
    <ellipse cx="28" cy="-52" rx="5" ry="7" fill="#F5F0EA" opacity="0.8"/>

    <!-- Back left - forward -->
    <ellipse cx="-32" cy="8" rx="7" ry="11" fill="#FFFFFF" stroke="#E5E0DA" stroke-width="0.5" transform="rotate(-5, -32, 8)"/>
    <ellipse cx="-32" cy="2" rx="5" ry="6" fill="#F5F0EA" opacity="0.8"/>

    <!-- Back right - back -->
    <ellipse cx="32" cy="22" rx="7" ry="11" fill="#FFFFFF" stroke="#E5E0DA" stroke-width="0.5" transform="rotate(5, 32, 22)"/>
    <ellipse cx="32" cy="30" rx="5" ry="6" fill="#F5F0EA" opacity="0.8"/>

    <!-- Small orange patches on legs -->
    <ellipse cx="28" cy="-44" rx="3" ry="4" fill="#D45500" opacity="0.4"/>
    <ellipse cx="-32" cy="10" rx="3" ry="4" fill="#D45500" opacity="0.4"/>
  </g>
</svg>