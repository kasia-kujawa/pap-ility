<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Mud puddle — irregular blob, base -->
  <ellipse cx="100" cy="110" rx="80" ry="28" fill="#8B4513" stroke="#5C2E0A" stroke-width="0.8"/>

  <!-- Lighter mud highlights on surface -->
  <ellipse cx="80" cy="104" rx="35" ry="10" fill="#A0522D" opacity="0.8"/>
  <ellipse cx="130" cy="108" rx="25" ry="7" fill="#A0522D" opacity="0.7"/>

  <!-- Splatter blobs (lighter mud, around edge) -->
  <circle cx="50" cy="100" r="9" fill="#CD853F" stroke="#8B4513" stroke-width="0.5"/>
  <circle cx="160" cy="105" r="7" fill="#CD853F" stroke="#8B4513" stroke-width="0.5"/>
  <circle cx="70" cy="125" r="6" fill="#CD853F" stroke="#8B4513" stroke-width="0.5"/>
  <circle cx="140" cy="122" r="8" fill="#CD853F" stroke="#8B4513" stroke-width="0.5"/>
  <circle cx="95" cy="130" r="5" fill="#CD853F" stroke="#8B4513" stroke-width="0.5"/>
  <circle cx="115" cy="126" r="4" fill="#CD853F" stroke="#8B4513" stroke-width="0.5"/>

  <!-- Small mud droplets thrown up -->
  <circle cx="60" cy="85" r="4" fill="#CD853F"/>
  <circle cx="150" cy="88" r="3" fill="#A0522D"/>
  <circle cx="45" cy="115" r="3" fill="#A0522D"/>
  <circle cx="165" cy="118" r="3" fill="#A0522D"/>
  <circle cx="100" cy="80" r="3.5" fill="#CD853F"/>

  <!-- Dark interior wet spots -->
  <ellipse cx="90" cy="112" rx="12" ry="5" fill="#5C2E0A" opacity="0.4"/>
  <ellipse cx="125" cy="108" rx="8" ry="3.5" fill="#5C2E0A" opacity="0.3"/>

  <!-- Surface texture ripples -->
  <ellipse cx="100" cy="108" rx="55" ry="14" fill="none" stroke="#CD853F" stroke-width="0.6" opacity="0.4"/>
  <ellipse cx="100" cy="108" rx="38" ry="9" fill="none" stroke="#CD853F" stroke-width="0.5" opacity="0.3"/>

  <!-- Removed shadow for flat ground look -->
</svg>