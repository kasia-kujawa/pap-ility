<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Finish Gate — two posts with banner and checkered flag -->
  <!-- Subtle glow ring when active (always visible as part of SVG) -->
  <ellipse cx="100" cy="100" rx="80" ry="30" fill="#c41e3a" opacity="0.08"/>

  <!-- Left post (dark red) -->
  <rect x="44" y="60" width="8" height="80" rx="3" fill="#c41e3a" stroke="#8B0000" stroke-width="0.8"/>

  <!-- Right post (dark red) -->
  <rect x="148" y="60" width="8" height="80" rx="3" fill="#c41e3a" stroke="#8B0000" stroke-width="0.8"/>

  <!-- Top cap circles on posts -->
  <circle cx="48" cy="60" r="5" fill="#ffffff" stroke="#cccccc" stroke-width="0.5"/>
  <circle cx="152" cy="60" r="5" fill="#ffffff" stroke="#cccccc" stroke-width="0.5"/>

  <!-- Banner bar (white) spanning between posts -->
  <rect x="48" y="88" width="104" height="14" rx="2" fill="#ffffff" stroke="#cccccc" stroke-width="0.5"/>

  <!-- Checkered pattern on banner (red squares) -->
  <rect x="48" y="88" width="10" height="7" fill="#c41e3a"/>
  <rect x="64" y="88" width="10" height="7" fill="#c41e3a"/>
  <rect x="80" y="88" width="10" height="7" fill="#c41e3a"/>
  <rect x="96" y="88" width="10" height="7" fill="#c41e3a"/>
  <rect x="112" y="88" width="10" height="7" fill="#c41e3a"/>
  <rect x="128" y="88" width="10" height="7" fill="#c41e3a"/>
  <rect x="142" y="88" width="10" height="7" fill="#c41e3a"/>

  <rect x="54" y="95" width="10" height="7" fill="#c41e3a"/>
  <rect x="70" y="95" width="10" height="7" fill="#c41e3a"/>
  <rect x="86" y="95" width="10" height="7" fill="#c41e3a"/>
  <rect x="102" y="95" width="10" height="7" fill="#c41e3a"/>
  <rect x="118" y="95" width="10" height="7" fill="#c41e3a"/>
  <rect x="134" y="95" width="10" height="7" fill="#c41e3a"/>

  <!-- Post bases (ground) -->
  <rect x="40" y="138" width="16" height="4" rx="2" fill="#4A2A10" opacity="0.3"/>
  <rect x="144" y="138" width="16" height="4" rx="2" fill="#4A2A10" opacity="0.3"/>
</svg>