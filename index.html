<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Papillon Agility Course</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Load config first so Turnstile can read siteKey -->
  <script src="config.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoaded" async defer></script>
  <script>
    window.TURNSTILE_TOKEN = '';
    window.REFRESH_TURNSTILE = function() {
      if (window.turnstile) {
        try {
          window.turnstile.reset();
        } catch (err) {
          // No widget rendered (localhost or missing siteKey) — safe to ignore
        }
      }
    };
    function onTurnstileLoaded() {
      const siteKey = (typeof window !== 'undefined' && window.GAME_CONFIG?.turnstileSiteKey) || '';
      const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      if (isLocalhost) {
        console.log('Localhost detected — skipping Turnstile');
        window.TURNSTILE_TOKEN = 'localhost-bypass';
        return;
      }
      if (!siteKey) {
        console.warn('Turnstile site key missing — skipping Turnstile');
        return;
      }
      window.turnstile.render('#turnstile-container', {
        sitekey: siteKey,
        size: 'normal',
        appearance: 'interaction-only',
        callback: function(token) {
          window.TURNSTILE_TOKEN = token;
        },
        'error-callback': function() {
          window.TURNSTILE_TOKEN = '';
        },
      });
    }
  </script>

  <!-- Warn if opened via file:// -->
  <script>
    if (window.location.protocol === 'file:') {
      document.addEventListener('DOMContentLoaded', function() {
        var warning = document.createElement('div');
        warning.style.cssText = 'position:fixed;top:0;left:0;width:100%;padding:12px;background:#c41e3a;color:#fff;font-family:sans-serif;font-size:14px;text-align:center;z-index:9999;';
        warning.innerHTML = '⚠️ You must serve this game through a local server.<br>' +
          '<code style="background:rgba(0,0,0,0.3);padding:4px 8px;border-radius:4px;">python3 -m http.server 8080</code> ' +
          'then open <code style="background:rgba(0,0,0,0.3);padding:4px 8px;border-radius:4px;">http://localhost:8080</code>';
        document.body.appendChild(warning);
      });
    }
  </script>
</head>
<body>
  <script src="assets.js"></script>
  <div id="turnstile-container" style="position:fixed;left:-9999px;top:-9999px;"></div>
  <script src="game.js"></script>
</body>
</html>
